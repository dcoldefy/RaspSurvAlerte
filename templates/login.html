<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SurvAlerte — Connexion</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <meta name="theme-color" content="#1a3a5c">
  <style>
    body { background-color: #1a3a5c; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
<div class="container">
  <div class="mx-auto" style="max-width:400px">
    <div class="card shadow">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-airplane-fill fs-1 text-primary"></i>
          <h4 class="mt-2 fw-bold">SurvAlerte</h4>
        </div>

        {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
          <div class="mb-3">
            <input type="password" name="password" class="form-control"
                   placeholder="{% if first_time %}Définissez votre mot de passe admin{% else %}Mot de passe admin{% endif %}"
                   autofocus required>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            {% if first_time %}Définir le mot de passe{% else %}Connexion{% endif %}
          </button>
        </form>

        <hr class="my-4">
        <p class="text-muted text-center small mb-2">Vous avez reçu un lien personnel ?</p>
        {% if error_token %}
        <div class="alert alert-danger py-2">{{ error_token }}</div>
        {% endif %}
        <form method="POST" action="/login">
          <div class="mb-3">
            <input type="text" name="user_token" class="form-control form-control-sm"
                   placeholder="Collez votre lien ou token ici" autocomplete="off">
          </div>
          <button type="submit" class="btn btn-outline-secondary w-100 btn-sm">
            Accéder avec mon lien
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>
