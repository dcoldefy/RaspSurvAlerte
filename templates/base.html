<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}RaspSurAlert{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=2">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-main">
  <div class="container-fluid px-3">

    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
      <i class="bi bi-airplane-fill fs-5"></i>
      <span class="fw-bold">RaspSurAlert</span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto gap-1">
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
            <i class="bi bi-table me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path.startswith('/reglages') %}active{% endif %}"
             href="/reglages">
            <i class="bi bi-sliders me-1"></i>Réglages
          </a>
        </li>
      </ul>

      <span id="nav-status" class="navbar-text d-flex align-items-center gap-2 small">
        <span id="status-dot" class="status-dot status-wait"></span>
        <span id="status-text" class="text-light opacity-75">Initialisation…</span>
      </span>
    </div>

  </div>
</nav>

<main class="container-fluid px-3 py-3">
  {% block content %}{% endblock %}
</main>

<footer class="footer-bar text-center py-2 small text-muted">
  RaspSurAlert — Surveillance aérienne locale &nbsp;·&nbsp;
  <a href="https://opensky-network.org" target="_blank" class="text-muted">OpenSky Network</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
