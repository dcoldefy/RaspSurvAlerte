<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SurvAlerte{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ css_version }}">
  <link rel="icon" type="image/svg+xml" href="/static/icons/icon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a3a5c">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-main">
  <div class="container-fluid px-3">

    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
      <i class="bi bi-airplane-fill fs-5"></i>
      <span class="fw-bold">SurvAlerte</span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto gap-1">
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
            <i class="bi bi-table me-1"></i>Dashboard
          </a>
        </li>
        {% if is_admin %}
        <li class="nav-item">
          <a class="nav-link {% if request.path.startswith('/reglages') %}active{% endif %}"
             href="/reglages">
            <i class="bi bi-sliders me-1"></i>Réglages
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path.startswith('/admin') %}active{% endif %}"
             href="/admin/users">
            <i class="bi bi-people-fill me-1"></i>Utilisateurs
          </a>
        </li>
        {% endif %}
      </ul>

      {% if is_admin %}
      <a href="/logout" class="btn btn-sm btn-outline-light me-2">
        <i class="bi bi-box-arrow-right me-1"></i>Déconnexion
      </a>
      {% endif %}
      <button id="btn-install" class="btn btn-sm btn-outline-light me-2 d-none">
        <i class="bi bi-download me-1"></i>Installer
      </button>
      <span id="nav-status" class="navbar-text d-flex align-items-center gap-2 small">
        <span id="status-dot" class="status-dot status-wait"></span>
        <span id="status-text" class="text-light opacity-75">Initialisation…</span>
      </span>
    </div>

  </div>
</nav>

<main class="container-fluid px-3 py-3">
  {% block content %}{% endblock %}
</main>

<footer class="footer-bar text-center py-2 small text-muted">
  SurvAlerte — Surveillance aérienne locale &nbsp;·&nbsp;
  <a href="https://opensky-network.org" target="_blank" class="text-muted">OpenSky Network</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% block scripts %}{% endblock %}
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
  let _installPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    _installPrompt = e;
    document.getElementById('btn-install').classList.remove('d-none');
  });
  document.getElementById('btn-install').addEventListener('click', async () => {
    if (!_installPrompt) return;
    _installPrompt.prompt();
    const { outcome } = await _installPrompt.userChoice;
    if (outcome === 'accepted') document.getElementById('btn-install').classList.add('d-none');
    _installPrompt = null;
  });
  window.addEventListener('appinstalled', () => {
    document.getElementById('btn-install').classList.add('d-none');
  });
</script>
</body>
</html>
